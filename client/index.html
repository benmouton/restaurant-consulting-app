<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0d1117" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="The Restaurant Consultant" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="The Restaurant Consultant — Systems that work on your worst night. Restaurant operations consulting platform for independent owners and operators." />
    <link rel="icon" type="image/jpeg" href="/icon.jpg" />
    <link rel="shortcut icon" type="image/jpeg" href="/icon.jpg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>The Restaurant Consultant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body style="background:#0e0f16">
    <div id="root"></div>
    <div id="app-loader" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0e0f16;color:#fff;font-family:'DM Sans',system-ui,sans-serif;">
      <div style="width:48px;height:48px;border:3px solid rgba(255,255,255,0.1);border-top-color:#c9a44a;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
      <p id="loader-text" style="margin-top:20px;font-size:14px;color:rgba(255,255,255,0.6);"></p>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script>
      (function() {
        var loader = document.getElementById('app-loader');
        var loaderText = document.getElementById('loader-text');
        var checkInterval = setInterval(function() {
          var root = document.getElementById('root');
          if (root && root.children.length > 0) {
            clearInterval(checkInterval);
            clearTimeout(retryTimeout);
            loader.style.transition = 'opacity 0.3s';
            loader.style.opacity = '0';
            setTimeout(function() { loader.remove(); }, 300);
          }
        }, 200);
        var retryCount = 0;
        var retryTimeout = setTimeout(function retry() {
          retryCount++;
          if (retryCount <= 5) {
            loaderText.textContent = 'Connecting to server... (attempt ' + retryCount + ')';
            retryTimeout = setTimeout(retry, 3000);
          } else {
            loaderText.textContent = 'Having trouble connecting. Tap to retry.';
            loader.style.cursor = 'pointer';
            loader.onclick = function() { location.reload(); };
          }
        }, 5000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
